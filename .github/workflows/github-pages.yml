# Публикует dist на GitHub Pages (URL: https://<user>.github.io/taskai/)
#
# Один раз в репозитории:
# 1) Settings → Secrets → Actions: VITE_API_URL = https://taskai-lxtd.onrender.com/api
#    (опционально VITE_OPENROUTER_* для чата)
# 2) Settings → Pages → Source: GitHub Actions
# 3) Settings → Environments → github-pages → Deployment branches: разреши main (или All branches)
# 4) Render → FRONTEND_ORIGIN должен включать https://samultra.github.io (и при желании localhost)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Check VITE_API_URL secret
        run: |
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then
            echo "::error::В Settings → Secrets → Actions добавь VITE_API_URL (https://ТВОЙ-СЕРВИС.onrender.com/api)"
            exit 1
          fi

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          VITE_OPENROUTER_MODEL: ${{ secrets.VITE_OPENROUTER_MODEL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Если деплой отклонён: Settings → Environments → github-pages → Deployment branches
  # разреши ветку main (или «All branches»), либо сними required reviewers.
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
